<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Músic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        
            background-image: url('imagens/background2.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

       
        body {
            background-color: #1a1a2e;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .audio-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        audio {
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            background-color: rgba(255, 255, 255, 0.95);
            padding: 5px;
        }

        .audio-info {
            color: white;
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            background-color: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
        }

        /* Estilo das logos - exatamente igual ao código anterior */
        .logo {
            position: fixed;
            z-index: 100;
            max-width: 200px;
            max-height: 200px;
            width: auto;
            height: auto;
            opacity: 0.9;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 1;
        }

        /* Posições originais para PC */
        .logo-bottom-right {
            bottom: -40px;
            right: 13px;
        }

        .logo-top-left {
            top: -40px;
            left: 13px;
        }

        /* Ajustes para tablets e telemóveis */
        @media (max-width: 768px) {
            .logo {
                max-width: 100px;
                max-height: 100px;
            }
            
            /* Ajuste no body para dar espaço às logos em mobile */
            body {
                padding: 70px 20px 70px 20px;
            }

            /* POSIÇÕES PARA MOBILE: bottom 0px right 13px e top 0px left 13px */
            .logo-bottom-right {
                bottom: 0px;
                right: 13px;
            }

            .logo-top-left {
                top: 0px;
                left: 13px;
            }
        }

        /* Ajuste para modo paisagem (horizontal) no telemóvel */
        @media (max-width: 900px) and (orientation: landscape) {
            body {
                padding: 55px 20px 55px 20px;
            }
            
            .logo {
                max-width: 65px;
                max-height: 65px;
            }

            /* Mantém as posições corrigidas também em landscape */
            .logo-bottom-right {
                bottom: 0px;
                right: 13px;
            }

            .logo-top-left {
                top: 0px;
                left: 13px;
            }
        }

        /* Para tablets em modo retrato */
        @media (min-width: 769px) and (max-width: 1024px) and (orientation: portrait) {
            body {
                padding: 80px 20px 80px 20px;
            }
            
            .logo {
                max-width: 120px;
                max-height: 120px;
            }
        }

        @media (max-width: 480px) {
            audio {
                max-width: 90%;
            }
            
            .audio-info {
                font-size: 12px;
                margin-top: 15px;
            }
        }
      
        @media (orientation: landscape) and (max-height: 600px) {
            audio {
                max-width: 70%;
            }
        }
    </style>
</head>
<body>
    <!-- Logo superior esquerda -->
    <img src="imagens/ETIC_Algarve-Logo.png" alt="Logotipo" class="logo logo-top-left">

    <div class="audio-container">
        <audio controls preload="auto">
            <source src="audio/audio1.mp3" type="audio/mpeg">
            <source src="audio/audio1.ogg" type="audio/ogg">
            <source src="audio/audio1.wav" type="audio/wav">
            Seu navegador não suporta a tag de áudio.
        </audio>
    </div>

    <!-- Logo inferior direita -->
    <img src="imagens/ETIC_Algarve-Logo.png" alt="Logotipo" class="logo logo-bottom-right">
</body>
</html>
