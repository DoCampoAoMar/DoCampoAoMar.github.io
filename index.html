<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('imagens/background4.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Container transparente e elegante para a galeria */
        .gallery-wrapper {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(3px);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        /* Estilo para as imagens mais pequenas e centradas */
        .gallery-img {
            width: 100%;
            height: auto;
            max-width: 160px;
            margin: 0 auto;
            display: block;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-img:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* Ajuste do grid para centralizar perfeitamente */
        .grid {
            justify-items: center;
            align-items: center;
        }

        /* Cada item do grid terá as imagens centralizadas */
        .grid > * {
            display: flex;
            justify-content: center;
        }

        /* Estilo aged e torn-frame mantidos igual ao original */
        .aged {
            filter: sepia(0.15) contrast(1.02);
            transition: all 0.3s ease;
        }

        .torn-frame {
            border: 2px solid rgba(210, 180, 140, 0.7);
            border-radius: 16px;
            padding: 5px;
            background: rgba(245, 240, 225, 0.3);
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.2);
            display: inline-block;
        }

        .rounded-xl {
            border-radius: 12px;
        }

        /* Estilo para ambas as logos (mesmas características) */
        .logo {
            position: fixed;
            z-index: 100;
            max-width: 200px;
            max-height: 200px;
            width: auto;
            height: auto;
            opacity: 0.9;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 1;
        }

        /* Logo inferior direita - EXATAMENTE como pedido: bottom: -10px; right: 13px */
        .logo-bottom-right {
            bottom: -20px;
            right: 13px;
        }

        /* Logo superior esquerda - MESMAS CARACTERÍSTICAS: top: -10px; left: 13px */
        .logo-top-left {
            top: -20px;
            left: 13px;
        }

        /* Responsividade para telas menores */
        @media (max-width: 768px) {
            .logo {
                max-width: 100px;
                max-height: 100px;
            }
            
            .gallery-wrapper {
                padding: 1.5rem 1rem;
            }
            
            .gallery-img {
                max-width: 130px;
            }
        }

        @media (max-width: 640px) {
            .gallery-img {
                max-width: 110px;
            }
            
            .torn-frame {
                padding: 3px;
            }
        }
    </style>
</head>
<body>

    <!-- Logo superior esquerda - MESMAS CARACTERÍSTICAS: top -10px left 13px -->
    <img src="imagens/ETIC_Algarve-Logo.png" alt="Logotipo" class="logo logo-top-left">

    <!-- Container transparente com galeria centralizada -->
    <div class="gallery-wrapper">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 justify-items-center items-center">
            <div>
                <img src="/imagens/video1.png" class="aged torn-frame rounded-xl gallery-img" alt="">
            </div>
            <div>
                <img src="/imagens/video2.png" class="aged torn-frame rounded-xl gallery-img" alt="">
            </div>
            <div>
                <img src="/imagens/video3.png" class="aged torn-frame rounded-xl gallery-img" alt="">
            </div>
            <div>
                <img src="/imagens/video4.png" class="aged torn-frame rounded-xl gallery-img" alt="">
            </div>
            <div>
                <img src="/imagens/video5.png" class="aged torn-frame rounded-xl gallery-img" alt="">
            </div>
            <div>
                <img src="/imagens/music1.png" class="aged torn-frame rounded-xl gallery-img" alt="">
            </div>
            <div>
                <img src="/imagens/music2.png" class="aged torn-frame rounded-xl gallery-img" alt="">
            </div>
        </div>
    </div>

    <!-- Logo inferior direita - POSIÇÃO ORIGINAL MANTIDA: bottom -10px right 13px -->
    <img src="imagens/ETIC_Algarve-Logo.png" alt="Logotipo" class="logo logo-bottom-right">

</body>
</html>
