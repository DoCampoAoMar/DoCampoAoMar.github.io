<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ETIC Algarve - Galeria Vintage</title>
    <!-- Tailwind CSS CDN + Google Fonts para elegância -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Adicionar uma fonte mais refinada e ajustes customizados -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('imagens/background4.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* Overlay suave para melhorar legibilidade e elegância (opcional, mas dá profundidade) */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            pointer-events: none;
            z-index: 0;
        }

        /* Container principal da galeria com espaçamento refinado */
        .gallery-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            background: rgba(255, 255, 245, 0.08);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.35);
            transition: all 0.2s ease;
        }

        /* Efeito envelhecido + borda rasgada elegante (mais sutil e refinado) */
        .aged {
            filter: sepia(0.2) contrast(1.02) brightness(0.98);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            box-shadow: 0 12px 22px -10px rgba(0, 0, 0, 0.4);
        }

        .aged:hover {
            filter: sepia(0.05) contrast(1.05) brightness(1.02);
            transform: scale(1.02) translateY(-5px);
            box-shadow: 0 22px 28px -12px rgba(0, 0, 0, 0.5);
        }

        /* Borda rasgada (torn-frame) mais elegante e sutil, mantendo o caráter vintage */
        .torn-frame {
            position: relative;
            border: 2px solid rgba(230, 210, 170, 0.65);
            border-radius: 18px;
            background: #fef7e0;
            padding: 5px;
            box-shadow: 0 6px 12px -6px rgba(0, 0, 0, 0.3);
        }

        .torn-frame img {
            border-radius: 12px;
            display: block;
            width: 100%;
            height: auto;
            transition: transform 0.2s;
        }

        /* Ajuste para as imagens ficarem mais pequenas e proporcionais dentro do grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1.8rem;
            justify-items: center;
            align-items: center;
        }

        /* Cada item da galeria tem largura controlada e centralização */
        .gallery-item {
            width: 100%;
            max-width: 200px;
            margin: 0 auto;
            transition: all 0.2s;
        }

        /* Para telas médias e grandes, as imagens ficam menores e harmônicas */
        @media (min-width: 640px) {
            .gallery-grid {
                grid-template-columns: repeat(2, minmax(150px, 190px));
                gap: 2rem;
                justify-content: center;
            }
        }

        @media (min-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(3, minmax(150px, 180px));
                gap: 2rem;
            }
        }

        @media (min-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(4, minmax(150px, 180px));
                gap: 2rem;
            }
        }

        /* Estilo para ambos os logos: fixos e elegantes */
        .logo-corner {
            position: fixed;
            z-index: 200;
            max-width: 110px;
            max-height: 110px;
            width: auto;
            height: auto;
            transition: transform 0.25s ease, opacity 0.25s ease;
            opacity: 0.9;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
            cursor: pointer;
        }

        .logo-corner:hover {
            opacity: 1;
            transform: scale(1.02);
        }

        /* Logo superior esquerdo */
        .logo-top-left {
            top: 24px;
            left: 24px;
        }

        /* Logo inferior direito (mantido da versão anterior) */
        .logo-bottom-right {
            bottom: 24px;
            right: 24px;
        }

        /* Responsividade para tablets e mobile: logos ligeiramente menores */
        @media (max-width: 768px) {
            .logo-corner {
                max-width: 75px;
                max-height: 75px;
            }
            .logo-top-left {
                top: 16px;
                left: 16px;
            }
            .logo-bottom-right {
                bottom: 16px;
                right: 16px;
            }
            .gallery-container {
                padding: 1.5rem 1rem;
                margin-top: 0.5rem;
                margin-bottom: 0.5rem;
            }
            body {
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            .logo-corner {
                max-width: 60px;
                max-height: 60px;
            }
            .gallery-grid {
                gap: 1.2rem;
            }
            .gallery-item {
                max-width: 140px;
            }
            .torn-frame {
                padding: 3px;
                border-width: 1.5px;
            }
        }

        /* Título elegante opcional para dar contexto (sem poluir) */
        .gallery-title {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: #fef9e6;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            font-size: 1.5rem;
            backdrop-filter: blur(4px);
            display: inline-block;
            width: auto;
            padding: 0 1rem;
            border-radius: 60px;
        }

        @media (max-width: 640px) {
            .gallery-title {
                font-size: 1.2rem;
                margin-bottom: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- LOGO CANTO SUPERIOR ESQUERDO (mesmas dimensões e posição elegante) -->
    <img src="imagens/ETIC_Algarve-Logo.png" 
         alt="ETIC Algarve Logotipo" 
         class="logo-corner logo-top-left" 
         loading="eager">

    <!-- Container principal da galeria centralizada e elegante -->
    <div class="gallery-container">
        <!-- Título sutil para dar contexto (pode ser removido se desejar, mas mantém elegância) -->
        <div class="gallery-title">
            ✦ memórias vintage ✦
        </div>

        <!-- Grelha de imagens: menor, centrada, espaçamento refinado -->
        <div class="gallery-grid">
            <!-- Video thumbs (agora mais pequenas e centralizadas) -->
            <div class="gallery-item">
                <div class="aged torn-frame">
                    <img src="/imagens/video1.png" alt="Vídeo 1" loading="lazy">
                </div>
            </div>
            <div class="gallery-item">
                <div class="aged torn-frame">
                    <img src="/imagens/video2.png" alt="Vídeo 2" loading="lazy">
                </div>
            </div>
            <div class="gallery-item">
                <div class="aged torn-frame">
                    <img src="/imagens/video3.png" alt="Vídeo 3" loading="lazy">
                </div>
            </div>
            <div class="gallery-item">
                <div class="aged torn-frame">
                    <img src="/imagens/video4.png" alt="Vídeo 4" loading="lazy">
                </div>
            </div>
            <div class="gallery-item">
                <div class="aged torn-frame">
                    <img src="/imagens/video5.png" alt="Vídeo 5" loading="lazy">
                </div>
            </div>
            <div class="gallery-item">
                <div class="aged torn-frame">
                    <img src="/imagens/music1.png" alt="Música 1" loading="lazy">
                </div>
            </div>
            <div class="gallery-item">
                <div class="aged torn-frame">
                    <img src="/imagens/music2.png" alt="Música 2" loading="lazy">
                </div>
            </div>
        </div>
    </div>

    <!-- LOGO CANTO INFERIOR DIREITO (original, mantido e com mesmo estilo refinado) -->
    <img src="imagens/ETIC_Algarve-Logo.png" 
         alt="ETIC Algarve Logotipo" 
         class="logo-corner logo-bottom-right" 
         loading="eager">

    <!-- Pequeno script para garantir que as imagens tenho fallback caso não carreguem (apenas para tornar robusto, opcional) -->
    <script>
        (function() {
            // Adiciona uma classe sutil caso o fundo precise de ajuste extra, mas apenas para elegância
            const imgs = document.querySelectorAll('.gallery-item img');
            imgs.forEach(img => {
                img.addEventListener('error', function(e) {
                    // Fallback silencioso: apenas evita quebra visual, mas não exibe nada agressivo
                    this.style.opacity = '0.6';
                    this.style.backgroundColor = '#d9c8a9';
                    this.style.minHeight = '100px';
                });
            });
            // Pequena melhoria: as logos mantém proporção, já estão com classes responsivas
            console.log('Site elegante com imagens centralizadas e logos nos cantos');
        })();
    </script>
</body>
</html>
