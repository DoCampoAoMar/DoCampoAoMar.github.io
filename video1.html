<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('imagens/background1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

    
        .logo {
            position: fixed;
            bottom: -30px;
            right: 20px;
            z-index: 100;
            max-width: 150px;
            max-height: 150px;
            width: auto;
            height: auto;
            opacity: 0.9;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 1;
        }

        .logo-top-left {
            position: fixed;
            top: -20px;
            left: -19px;
            z-index: 100;
            max-width: 150px;
            max-height: 150px;
            width: auto;
            height: auto;
            opacity: 0.9;
            transition: opacity 0.3s ease;
        }

        .logo-top-left:hover {
            opacity: 1;
        }

        .video-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        video {
            max-width: 100%;
            max-height: 90vh;
            width: auto;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 480px) {
            video {
                max-height: 80vh;
            }
            
            body {
                padding: 10px;
            }

            .logo {
                bottom: -10px;
                right: 13px;
                max-width: 100px;
                max-height: 100px;
            }

            .logo-top-left {
                top: 0px;
                left: 5px;
                max-width: 100px;
                max-height: 100px;
            }
        }

        @media (orientation: landscape) and (max-height: 600px) {
            video {
                max-height: 85vh;
            }

            .logo {
                bottom: -10px;
                right: 13px;
                max-width: 100px;
                max-height: 100px;
            }

            .logo-top-left {
                top: 5px;
                left: -10px;
                max-width: 100px;
                max-height: 100px;
            }
        }
    </style>
</head>
<body>


    <img src="imagens/ETIC_Algarve-Logo.png" alt="Logotipo" class="logo">
    

    <img src="imagens/Artboard38.png" alt="Logotipo" class="logo-top-left">

    <div class="video-container">
        <video controls>
            <source src="videos/video1.mp4" type="video/mp4">
            Seu navegador não suporta a tag de vídeo.
        </video>
    </div>
</body>
</html>
