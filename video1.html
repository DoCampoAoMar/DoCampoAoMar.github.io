<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('imagens/background1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Estilo base para ambas as logos */
        .logo {
            position: fixed;
            z-index: 100;
            max-width: 200px;
            max-height: 200px;
            width: auto;
            height: auto;
            opacity: 0.9;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 1;
        }

        /* Logo inferior direita */
        .logo-bottom-right {
            bottom: -30px;
            right: 30px;
        }

        /* Logo superior esquerda */
        .logo-top-left {
            top: -30px;
            left: 30px;
        }

        .video-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        video {
            max-width: 100%;
            max-height: 90vh;
            width: auto;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 480px) {
            video {
                max-height: 80vh;
            }
            
            body {
                padding: 70px 10px 70px 10px;
            }

            .logo {
                max-width: 100px;
                max-height: 100px;
            }

            .logo-bottom-right {
                bottom: 0px;
                right: 13px;
            }

            .logo-top-left {
                top: 0px;
                left: 13px;
            }
        }

        @media (orientation: landscape) and (max-height: 600px) {
            video {
                max-height: 85vh;
            }

            body {
                padding: 55px 10px 55px 10px;
            }

            .logo {
                max-width: 65px;
                max-height: 65px;
            }

            .logo-bottom-right {
                bottom: 0px;
                right: 13px;
            }

            .logo-top-left {
                top: 0px;
                left: 13px;
            }
        }
    </style>
</head>
<body>

    <!-- Logo superior esquerda -->
    <img src="imagens/ETIC_Algarve-Logo.png" alt="Logotipo" class="logo logo-top-left">

    <div class="video-container">
        <video controls>
            <source src="videos/video1.mp4" type="video/mp4">
            Seu navegador não suporta a tag de vídeo.
        </video>
    </div>

    <!-- Logo inferior direita -->
    <img src="imagens/ETIC_Algarve-Logo.png" alt="Logotipo" class="logo logo-bottom-right">

</body>
</html>
